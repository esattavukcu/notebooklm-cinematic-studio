name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source zip
        run: |
          set -euo pipefail
          NAME="notebooklm-cinematic-studio-${GITHUB_REF_NAME}"
          mkdir -p "dist/${NAME}"
          # Sadece source dosyaları — venv, data, chrome_profiles dahil değil (.gitignore zaten yok onları)
          rsync -av \
            --exclude '.venv' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'data' \
            --exclude 'chrome_profiles' \
            --exclude '*.log' \
            --exclude '.DS_Store' \
            ./ "dist/${NAME}/"
          # Shell scriptlerin executable bit'i zip'e taşınsın
          chmod +x "dist/${NAME}"/*.sh || true
          (cd dist && zip -r "${NAME}.zip" "${NAME}")
          ls -la dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/notebooklm-cinematic-studio-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
