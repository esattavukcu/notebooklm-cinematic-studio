name: Release source zip

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from tag
        id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VER="${GITHUB_REF#refs/tags/}"
          else
            VER="dev-$(date +%Y%m%d-%H%M)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Create source zip
        run: |
          ZIP_NAME="notebooklm-cinematic-studio-${{ steps.ver.outputs.version }}.zip"
          mkdir -p _dist
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='.venv' \
            --exclude='__pycache__' --exclude='data' \
            --exclude='chrome_profile' --exclude='chrome_profiles' \
            --exclude='*.zip' --exclude='*.app' --exclude='_dist' \
            --exclude='.installed_version' --exclude='launcher.log' \
            --exclude='_video_frames' \
            ./ _dist/notebooklm-cinematic-studio/
          (cd _dist && zip -qr "../$ZIP_NAME" notebooklm-cinematic-studio)
          ls -la "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: notebooklm-cinematic-${{ steps.ver.outputs.version }}
          path: ${{ env.ZIP_NAME }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          name: ${{ steps.ver.outputs.version }}
          body: |
            ## Kurulum

            ```bash
            git clone https://github.com/esattavukcu/notebooklm-cinematic-studio.git
            cd notebooklm-cinematic-studio
            ./setup.sh
            ./app.sh
            ```

            Tarayıcıda `http://localhost:8501` otomatik açılır.

            Detaylar README'de.
